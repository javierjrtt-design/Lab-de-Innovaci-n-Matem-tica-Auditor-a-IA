<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Innovation Lab - Auditoría VCSP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vcsp: { teal: '#005B50', gold: '#C9A14D', navy: '#0A2D57', anthracite: '#333333' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .drop-zone { border: 2px dashed #CBD5E1; transition: 0.3s; }
        .drop-zone.active { border-color: #005B50; background: #f0fdf4; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #005B50; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col">

    <header class="bg-vcsp-teal text-white p-4 border-b-4 border-vcsp-gold shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-square-root-alt text-vcsp-gold text-2xl"></i>
                <h1 class="font-bold uppercase tracking-tight text-sm md:text-base">Math Lab Auditoría</h1>
            </div>
            <p class="text-[9px] font-bold uppercase tracking-widest text-vcsp-gold hidden md:block">Villa Caritas & San Pedro</p>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto w-full p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="space-y-6">
            <div id="drop-zone" class="drop-zone rounded-xl p-10 text-center cursor-pointer">
                <input type="file" id="file-input" class="hidden" accept=".pdf,.txt">
                <i class="fas fa-file-pdf text-4xl text-slate-300 mb-4"></i>
                <p class="text-sm font-bold text-slate-600 uppercase">Sube tu PDF aquí</p>
                <div id="loader" class="hidden mt-4 flex justify-center"><div class="spinner"></div></div>
            </div>

            <div class="bg-vcsp-navy p-6 rounded-xl text-white">
                <h3 class="text-vcsp-gold font-bold text-xs uppercase mb-2">Instrucciones</h3>
                <p class="text-xs opacity-80 leading-relaxed">Sube el borrador de tu exploración. La IA extraerá el título y las fórmulas principales para iniciar la auditoría de rigor.</p>
            </div>
        </div>

        <div class="space-y-4">
            <input type="text" id="doc-title" placeholder="Título detectado..." class="w-full border p-3 rounded-lg text-sm outline-none focus:border-vcsp-teal">
            <textarea id="doc-math" placeholder="Fórmulas detectadas..." class="w-full border p-3 rounded-lg text-xs font-mono h-24 outline-none focus:border-vcsp-teal"></textarea>
            
            <button id="btn-audit" class="w-full bg-vcsp-teal text-white font-bold py-3 rounded-lg hover:bg-opacity-90 transition">
                EJECUTAR AUDITORÍA
            </button>

            <div id="results" class="hidden bg-slate-50 border-l-4 border-vcsp-gold p-6 rounded-r-lg text-sm space-y-4">
                </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN CRÍTICA PARA GITHUB PAGES
        // Usamos el worker desde el mismo CDN que la librería principal
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loader').classList.remove('hidden');
            
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    // Lectura segura mediante ArrayBuffer (evita problemas de CORS locales)
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    
                    for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        text += content.items.map(item => item.str).join(" ") + " ";
                    }
                } else {
                    text = await file.text();
                }

                // Simulación de detección (Aquí iría tu llamada a la API)
                document.getElementById('doc-title').value = "Detectando título...";
                document.getElementById('doc-math').value = "Extrayendo modelos...";
                
                console.log("Texto extraído:", text.substring(0, 200));
                alert("¡Archivo cargado con éxito! Texto procesado correctamente.");

            } catch (err) {
                console.error(err);
                alert("Error técnico: GitHub Pages bloqueó el proceso o el PDF es inválido.");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
